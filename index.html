<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Robotics Submarine Flight Computer</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <style>
        html, body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: #000; /* Prevents white flash before load */
        }
        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
            outline: none;
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        /** 
         * ROBOTICS FLIGHT COMPUTER V2.1 (Fixed)
         * -------------------------------------
         * Controls:
         * Mouse: Look Around (Pitch/Yaw)
         * Up Arrow: Thrust Forward
         * Down Arrow: Thrust Brake
         * 'C': Toggle Course Lock (Auto-level)
         * '1': Heavy Submarine Variant
         * '2': Recon AUV Variant
         */

        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true });

        // --- Constants & State ---
        const BVec3 = BABYLON.Vector3;
        let autoCourse = false;
        let activeVariantIndex = 0;
        let currentShipMesh = null;
        let speed = 0;
        
        // --- Vehicle Variants Configuration ---
        const VARIANTS = [
            { 
                name: "MK-1 Heavy Submarine", 
                speedMax: 1.2, 
                acceleration: 0.005, 
                turnSpeed: 0.00005, 
                inertia: 0.98, 
                drag: 0.003, 
                color: new BABYLON.Color3(0.2, 0.4, 0.8),
                meshType: "box" // Simple representation
            },
            { 
                name: "MK-2 Recon AUV", 
                speedMax: 2.8, 
                acceleration: 0.012, 
                turnSpeed: 0.0001, 
                inertia: 0.96, 
                drag: 0.008, 
                color: new BABYLON.Color3(0.9, 0.2, 0.2),
                meshType: "torpedo"
            }
        ];

        // --- Input State ---
        let inputThrust = 0;
        let mouseX = 0, mouseY = 0;

        const createScene = function() {
            const scene = new BABYLON.Scene(engine);
            
            // Dark Underwater Atmosphere
            scene.clearColor = new BABYLON.Color4(0.02, 0.05, 0.1, 1); 
            scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
            scene.fogDensity = 0.002;
            scene.fogColor = new BABYLON.Color3(0.05, 0.1, 0.15);

            // Camera
            const camera = new BABYLON.UniversalCamera("camera", new BVec3(0, 10, -20), scene);
            camera.setTarget(BVec3.Zero());
            camera.attachControl(canvas, true);
            camera.minZ = 0.5;
            camera.maxZ = 1500;

            // Lighting
            const light = new BABYLON.HemisphericLight("light1", new BVec3(0, -1, 0), scene);
            light.intensity = 0.6;
            light.groundColor = new BABYLON.Color3(0.1, 0.2, 0.3);

            const spotLight = new BABYLON.SpotLight("spotLight", new BVec3(0, 0, 0), new BVec3(0, 0, 1), Math.PI / 3, 20, scene);
            spotLight.intensity = 2.0; // Headlights
            spotLight.parent = camera;

            // Terrain
            createProceduralTerrain(scene);

            // Initial Ship
            switchVehicle(0, scene, camera);

            // HUD
            createHUD(scene, camera);

            // Input Mapping
            window.addEventListener("keydown", (e) => {
                switch (e.key) {
                    case "ArrowUp": inputThrust = 1; break;
                    case "ArrowDown": inputThrust = -0.5; break;
                    case "c": autoCourse = !autoCourse; break;
                    case "1": switchVehicle(0, scene, camera); break;
                    case "2": switchVehicle(1, scene, camera); break;
                }
            });

            window.addEventListener("keyup", (e) => {
                if (e.key === "ArrowUp" || e.key === "ArrowDown") inputThrust = 0;
            });

            // Main Logic Loop
            scene.onBeforeRenderObservable.add(() => {
                const variant = VARIANTS[activeVariantIndex];
                
                // 1. Input Processing
                if (autoCourse) {
                    // Auto-Level Logic: Dampen rotations
                    camera.rotation.x *= 0.95;
                    camera.rotation.z *= 0.95;
                } else {
                    // Mouse Control
                    // Assumes camera is attached to canvas inputs for simpler controls
                }

                // 2. Physics Update
                speed = speed * variant.inertia + (inputThrust * variant.acceleration);
                
                // Apply Drag
                if (inputThrust === 0 && speed > 0.01) speed -= variant.drag;
                if (speed < 0) speed = 0;
                if (speed > variant.speedMax) speed = variant.speedMax;

                // 3. Movement
                // Move camera forward based on its view direction
                // Getting forward vector properly
                const forward = camera.getDirection(BVec3.Left()).scale(-1); 
                // Note: Babylon Camera Forward() method varies by version, manual vector is safer:
                // Matrix based forward:
                const transformMatrix = camera.getWorldMatrix();
                const forwardDir = new BVec3();
                BVec3.TransformNormalToRef(BVec3.Left(), transformMatrix, forwardDir); // Left Hack for Z-Forward
                // Or just use standard logic:
                
                // Standard Flight Sim Movement:
                const moveDir = camera.getDirection(new BVec3(0,0,1)); // Z is usually forward in flight sims
                
                // Apply Movement
                camera.position.addInPlace(moveDir.scale(speed));

                // 4. Vehicle Visual Update
                if (currentShipMesh) {
                    // Bobbing effect
                    currentShipMesh.position.y = -0.15 + Math.sin(performance.now() * 0.005) * 0.01;
                    // Propeller spin based on speed
                    if (variant.meshType === "torpedo") {
                         currentShipMesh.rotation.y += speed * 0.5; 
                    }
                }
            });

            return scene;
        };

        function createProceduralTerrain(scene) {
            // Simple Ground
            const ground = BABYLON.MeshBuilder.CreateGround("terrain", { width: 2000, height: 2000, subdivisions: 50 }, scene);
            const positions = ground.getVerticesData(BABYLON.VertexBuffer.PositionKind);
            
            // Create Hills
            for (let i = 0; i < positions.length; i += 3) {
                const x = positions[i];
                const z = positions[i + 2];
                // Simple noise function
                positions[i + 1] = (Math.sin(x * 0.05) + Math.cos(z * 0.05)) * 8.0;
            }
            
            ground.updateVerticesData(BABYLON.VertexBuffer.PositionKind, positions);
            ground.computeVertexNormals();

            const mat = new BABYLON.StandardMaterial("groundMat", scene);
            mat.diffuseColor = new BABYLON.Color3(0.1, 0.15, 0.1); // Dark Green/Black
            mat.specularColor = new BABYLON.Color3(0, 0, 0);
            ground.material = mat;
        }

        function switchVehicle(index, scene, camera) {
            if (currentShipMesh) currentShipMesh.dispose();
            
            activeVariantIndex = index;
            const config = VARIANTS[index];

            if (index === 0) {
                // Heavy Sub
                currentShipMesh = BABYLON.MeshBuilder.CreateBox("sub", { width: 0.5, height: 0.25, depth: 1.5 }, scene);
                const tower = BABYLON.MeshBuilder.CreateBox("tower", { width: 0.15, height: 0.4, depth: 0.15 }, scene);
                tower.position.y = 0.3;
                tower.position.z = -0.2;
                tower.parent = currentShipMesh;
            } else {
                // Recon AUV (Torpedo shape)
                currentShipMesh = BABYLON.MeshBuilder.CreateCylinder("auv", { height: 1.8, diameterTop: 0.05, diameterBottom: 0.4, tessellation: 12 }, scene);
                currentShipMesh.rotation.x = Math.PI / 2;
                currentShipMesh.rotation.y = Math.PI;
            }

            const mat = new BABYLON.StandardMaterial("shipMat", scene);
            mat.emissiveColor = config.color;
            currentShipMesh.material = mat;

            currentShipMesh.parent = camera;
            currentShipMesh.position = new BVec3(0, -0.2, 1.5); // Cockpit view offset
        }

        function createHUD(scene, camera) {
            const advancedTexture = BABYLON.GUI.AdvancedDynamicTexture.CreateFullscreenUI("UI", true, scene);
            
            const panel = new BABYLON.GUI.StackPanel();
            panel.horizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
            panel.verticalAlignment = BABYLON.GUI.Control.VERTICAL_ALIGNMENT_TOP;
            panel.left = "20px";
            panel.top = "20px";
            advancedTexture.addControl(panel);

            const header = new BABYLON.GUI.TextBlock();
            header.text = "ONBOARD FLIGHT COMPUTER";
            header.color = "LimeGreen";
            header.fontSize = 24;
            panel.addControl(header);

            const statusText = new BABYLON.GUI.TextBlock();
            statusText.color = "White";
            statusText.fontSize = 18;
            statusText.height = "30px";
            panel.addControl(statusText);

            // Update Loop for HUD
            scene.onBeforeRenderObservable.add(() => {
                const variant = VARIANTS[activeVariantIndex];
                const depth = camera.position.y.toFixed(1);
                const spd = (speed * 50).toFixed(1); // Scale for realism

                statusText.text = 
                    `MODE: ${autoCourse ? "AUTO-LEVEL" : "MANUAL"} \n` +
                    `VEHICLE: ${variant.name} \n` +
                    `DEPTH: ${depth}m \n` +
                    `SPEED: ${spd} knots`;
            });
        }

        // --- Start ---
        const scene = createScene();

        engine.runRenderLoop(() => {
            scene.render();
        });

        window.addEventListener("resize", () => {
            engine.resize();
        });
    </script>
</body>
</html>
