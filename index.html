<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Robotics Submarine Flight Computer</title>
    <!-- Babylon.js Core -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<script>
/**
 * ROBOTICS FLIGHT COMPUTER V2.0
 * -----------------------------
 * Controls:
 * Mouse: Pitch (Up/Down) and Yaw/Roll (Left/Right)
 * Up Arrow: Thrust Forward
 * Down Arrow: Thrust Reverse / Brake
 * 'C': Toggle Course Lock (Auto-stabilization)
 * '1': Switch to Heavy Submarine Variant
 * '2': Switch to Recon AUV Variant
 */

const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true });

// --- Global State & Constants ---
const BVec3 = BABYLON.Vector3;
const PI = Math.PI, TWO_PI = 2 * PI;
let autoCourse = false;
let activeVariantIndex = 0;
let currentShipMesh = null;

// --- Vehicle Variants Configuration ---
const VARIANTS = [
    {
        name: "MK-1 Heavy Submarine",
        description: "High inertia, deep dive capability",
        speedMax: 1.2,
        acceleration: 0.002,
        turnSpeed: 0.00004,
        inertia: 0.98, // how much speed preserves
        drag: 0.005,
        color: new BABYLON.Color3(0.2, 0.2, 0.8),
        size: 1.0
    },
    {
        name: "MK-2 Recon AUV",
        description: "Agile, rapid response",
        speedMax: 2.5,
        acceleration: 0.008,
        turnSpeed: 0.00009,
        inertia: 0.95,
        drag: 0.01,
        color: new BABYLON.Color3(0.8, 0.2, 0.2),
        size: 0.6
    }
];

// --- Input State ---
let inputThrust = 0, inputYaw = 0;
let mouseXPct = 0, mouseYPct = 0;
let winCntrX = 0, winCntrY = 0;

// --- Helper Functions ---
const unwrapAngle = (a) => (a > TWO_PI) ? a - TWO_PI : (a < 0) ? a + TWO_PI : a;

const createScene = function() {
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.05, 0.1, 0.15, 1); // Deep water color

    // Camera Setup
    const camera = new BABYLON.UniversalCamera("camera1", BVec3.Zero(), scene);
    camera.minZ = 0.1;
    camera.maxZ = 2000;

    // Environment
    createProceduralTerrain(scene);
    
    // Lighting
    const light = new BABYLON.HemisphericLight("light1", new BVec3(0, -1, 0), scene);
    light.intensity = 0.7;
    light.groundColor = new BABYLON.Color3(0.1, 0.1, 0.3);

    // Initial Vehicle Creation
    switchVehicle(0, scene, camera);

    // --- Input Handling ---
    window.addEventListener("resize", () => {
        engine.resize();
        winCntrX = engine.getRenderWidth(true) / 2;
        winCntrY = engine.getRenderHeight(true) / 2;
    });
    
    // Initial resize call
    engine.resize();
    winCntrX = engine.getRenderWidth(true) / 2;
    winCntrY = engine.getRenderHeight(true) / 2;

    window.addEventListener("keydown", (e) => {
        switch (e.key) {
            case "ArrowUp": inputThrust = 1; break;
            case "ArrowDown": inputThrust = -0.5; break;
            case "c": autoCourse = !autoCourse; break;
            case "1": switchVehicle(0, scene, camera); break;
            case "2": switchVehicle(1, scene, camera); break;
        }
    });

    window.addEventListener("keyup", (e) => {
        if (e.key === "ArrowUp" || e.key === "ArrowDown") inputThrust = 0;
    });

    canvas.addEventListener("mousemove", () => {
        if(!autoCourse) {
            mouseXPct = (scene.pointerX - winCntrX) / winCntrX;
            mouseYPct = (scene.pointerY - winCntrY) / winCntrY;
        }
    });

    window.addEventListener("click", () => {
        // Click to toggle control mode if needed
    });

    // --- HUD Setup ---
    createHUD(scene);

    // --- Physics State ---
    let speed = 0; // Current speed

    // --- Main Render Loop ---
    engine.runRenderLoop(() => {
        const variant = VARIANTS[activeVariantIndex];
        let pitchRate = 0.0001;
        let yawRate = 0.0001;

        // Auto Course Logic vs Manual
        if (autoCourse) {
            // Stabilize: slowly level out pitch and roll
            mouseYPct = -camera.rotation.x / 2.0; 
            mouseXPct = -camera.rotation.z / 2.0;
        }

        // Calculate Inputs
        const targetPitch = mouseYPct * pitchRate * 2.0;
        const targetYaw = mouseXPct * yawRate * 2.0;

        // Apply Velocities (Simplified Inertial Model)
        speed = speed * variant.inertia + (inputThrust * variant.acceleration);
        
        // Apply Drag
        if (inputThrust === 0 && speed > 0.01) speed -= variant.drag;
        
        // Clamp Speed
        speed = Math.max(0, Math.min(speed, variant.speedMax));

        // Rotate Camera (Craft)
        // We use a quaternion based rotation helper to prevent gimbal lock
        addYawPitchRoll(camera, targetYaw * variant.turnSpeed * speed * 10000, targetPitch * variant.turnSpeed * speed * 10000);

        // Move Forward
        const forward = camera.getDirection(BVec3.Forward());
        camera.position.addInPlace(forward.scale(speed));

        // Update Visuals (Propeller spin, etc)
        if (currentShipMesh) {
            currentShipMesh.rotation.y += speed * 2; // Visual spinner
        }

        // Update Horizon indicator
        updateHorizon(scene, camera);

        scene.render();
    });

    return scene;
};

/**
 * Switches between vehicle variants
 */
function switchVehicle(index, scene, camera) {
    if (currentShipMesh) {
        currentShipMesh.dispose();
    }
    
    activeVariantIndex = index;
    const config = VARIANTS[index];

    // Create a procedural mesh for the vehicle
    // Variant 0: Boxier, heavier look
    // Variant 1: Sleek, torpedo look
    if (index === 0) {
        currentShipMesh = BABYLON.MeshBuilder.CreateBox("sub", { width: 0.4, height: 0.2, depth: 1.2 }, scene);
        // Add a tower
        const tower = BABYLON.MeshBuilder.CreateBox("tower", { width: 0.2, height: 0.3, depth: 0.2 }, scene);
        tower.parent = currentShipMesh;
        tower.position.y = 0.15;
        tower.position.z = -0.1;
    } else {
        currentShipMesh = BABYLON.MeshBuilder.CreateCylinder("auv", { height: 1.5, diameterTop: 0.1, diameterBottom: 0.4, tessellation: 12 }, scene);
        currentShipMesh.rotation.x = PI / 2; // Align length with Z
        currentShipMesh.rotation.y = PI; // Face forward
    }

    const mat = new BABYLON.StandardMaterial("matShip", scene);
    mat.emissiveColor = config.color;
    mat.diffuseColor = new BABYLON.Color3(0.1, 0.1, 0.1);
    currentShipMesh.material = mat;

    // Position relative to camera (cockpit view)
    currentShipMesh.parent = camera;
    currentShipMesh.position = new BVec3(0, -0.15, 1.0); // Slight offset so player can see it
    
    console.log(`Switched to: ${config.name}`);
}

/**
 * Creates a procedurally generated ocean floor.
 * Replaces the broken DynamicTerrain dependency.
 */
function createProceduralTerrain(scene) {
    const size = 2000;
    const subdivisions = 100;
    const ground = BABYLON.MeshBuilder.CreateGround("terrain", { width: size, height: size, subdivisions: subdivisions, updatable: true }, scene);
    
    const positions = ground.getVerticesData(BABYLON.VertexBuffer.PositionKind);
    
    // Apply noise to vertices
    for (let i = 0; i < positions.length; i += 3) {
        const x = positions[i];
        const z = positions[i + 2];
        
        // Simple sine-wave terrain generation to simulate hills/ridges
        let y = (Math.sin(x * 0.02) + Math.cos(z * 0.02)) * 15.0;
        y += Math.abs(Math.sin(x * 0.1) * Math.cos(z * 0.1)) * 5.0; // Ripples
        
        positions[i + 1] = Math.abs(y); // Make absolute height
    }
    
    ground.updateVerticesData(BABYLON.VertexBuffer.PositionKind, positions);
    ground.computeVertexNormals(); // Important for lighting

    const groundMat = new BABYLON.StandardMaterial("terrainMat", scene);
    groundMat.diffuseColor = new BABYLON.Color3(0.1, 0.3, 0.1); // Greenish depth
    groundMat.specularColor = new BABYLON.Color3(0, 0, 0);
    ground.material = groundMat;
}

/**
 * Adds rotation to the camera using Quaternions (prevents gimble lock)
 */
function addYawPitchRoll(camera, yaw, pitch) {
    if (!camera.rotationQuaternion) {
        camera.rotationQuaternion = new BABYLON.Quaternion();
    }
    
    // Get current rotation as quaternion
    const rotQuat = camera.rotationQuaternion;
    
    // Create delta quaternions
    const yawQuat = BABYLON.Quaternion.RotationAxis(BVec3.Up(), yaw);
    const pitchQuat = BABYLON.Quaternion.RotationAxis(BVec3.Left(), pitch);
    
    // Combine rotations: Yaw * Current * Pitch (order depends on coordinate system)
    yawQuat.multiplyToRef(rotQuat, rotQuat);
    rotQuat.multiplyToRef(pitchQuat, rotQuat);

    // Optional: Add banking/roll effect
    const roll = -yaw * 5.0; // Bank into turns
    const rollQuat = BABYLON.Quaternion.RotationAxis(BVec3.Forward(), roll);
    rotQuat.multiplyToRef(rollQuat, rotQuat);
    
    // Convert back to Euler for camera
    rotQuat.toEulerAnglesToRef(camera.rotation);
    camera.rotationQuaternion = rotQuat;
}

function updateHorizon(scene, camera) {
    // Implementation of Artificial Horizon indicator can go here if strictly needed
    // Currently handled by the HUD text texture
}

function createHUD(scene) {
    const advancedTexture = BABYLON.GUI.AdvancedDynamicTexture.CreateFullscreenUI("UI", true, scene);
    
    // Panel Background
    const panel = new BABYLON.GUI.StackPanel();
    panel.width = "220px";
    panel.horizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
    panel.verticalAlignment = BABYLON.GUI.Control.VERTICAL_ALIGNMENT_TOP;
    panel.left = "10px";
    panel.top = "10px";
    advancedTexture.addControl(panel);

    const createTextBlock = (text, color) => {
        const tb = new BABYLON.GUI.TextBlock();
        tb.text = text;
        tb.color = color || "white";
        tb.fontSize = 16;
        tb.textHorizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
        tb.height = "25px";
        return tb;
    };

    const title = createTextBlock("FLIGHT COMPUTER", "#00ff00");
    title.fontSize = 20;
    title.fontWeight = "bold";
    panel.addControl(title);

    const statusText = createTextBlock("MODE: MANUAL", "cyan");
    panel.addControl(statusText);

    const vehicleText = createTextBlock("VEHICLE: MK-1", "orange");
    panel.addControl(vehicleText);

    const speedText = createTextBlock("SPEED: 0 kts", "white");
    panel.addControl(speedText);

    const depthText = createTextBlock("DEPTH: 0m", "white");
    panel.addControl(depthText);

    // Update loop for HUD (hooked into scene onBeforeRender)
    scene.onBeforeRenderObservable.add(() => {
        const variant = VARIANTS[activeVariantIndex];
        statusText.text = `MODE: ${autoCourse ? "AUTO-LEVEL" : "MANUAL"}`;
        vehicleText.text = `VEHICLE: ${variant.name}`;
        speedText.text = `SPEED: ${(variant.speedMax * 100).toFixed(1)} m/s`;
        
        // Calculate depth (invert Y if underwater)
        const depth = camera.position.y.toFixed(1);
        depthText.text = `DEPTH: ${depth}m`;
    });
}

// --- Start Engine ---
const scene = createScene();
engine.runRenderLoop(() => {
    scene.render();
});

window.addEventListener("resize", () => {
    engine.resize();
});
</script>
</body>
</html>
